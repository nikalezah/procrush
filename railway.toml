# Backend (Ktor API) — build from repository root.
# Railway service: Settings → Config file: /railway.toml, Root Directory: empty
[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/Dockerfile.api"
watchPatterns = [
  "/backend/api/**",
  "/backend/shared/**",
  "/core/**",
  "/deploy/Dockerfile.api",
  "/gradle/**",
  "/gradlew",
  "/settings.gradle.kts",
  "/build.gradle.kts",
  "/gradle.properties",
  "/railway.toml",
]

[deploy]
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
