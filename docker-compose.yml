services:
  postgres:
    container_name: procrush-postgres
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: procrush
      POSTGRES_USER: procrush
      POSTGRES_PASSWORD: procrush
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  matching-postgres:
    container_name: procrush-matching-postgres
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: procrush_matching
      POSTGRES_USER: procrush
      POSTGRES_PASSWORD: procrush
    ports:
      - "5433:5432"
    volumes:
      - matching_postgres_data:/var/lib/postgresql

  redis:
    container_name: procrush-redis
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    container_name: procrush-rabbitmq
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: procrush
      RABBITMQ_DEFAULT_PASS: procrush
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  kafka:
    container_name: procrush-kafka
    image: apache/kafka:4.3.0
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/var/lib/kafka/data

volumes:
  postgres_data:
    name: procrush-postgres-data
  matching_postgres_data:
    name: procrush-matching-postgres-data
  redis_data:
    name: procrush-redis-data
  rabbitmq_data:
    name: procrush-rabbitmq-data
  kafka_data:
    name: procrush-kafka-data
