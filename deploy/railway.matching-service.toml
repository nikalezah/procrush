# Matching Service — build from repository root.
# Railway service: Settings → Config file: /deploy/railway.matching-service.toml, Root Directory: empty
[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/Dockerfile.matching-service"
watchPatterns = [
  "/matching-service/**",
  "/server/**",
  "/core/**",
  "/deploy/Dockerfile.matching-service",
  "/gradle/**",
  "/gradlew",
  "/settings.gradle.kts",
  "/build.gradle.kts",
  "/gradle.properties",
  "/deploy/railway.matching-service.toml",
]

[deploy]
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
