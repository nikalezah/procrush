# Personality Worker — build from repository root.
# Railway service: Settings → Config file: /deploy/railway.personality-worker.toml, Root Directory: empty
[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/Dockerfile.personality-worker"
watchPatterns = [
  "/personality-worker/**",
  "/server/**",
  "/core/**",
  "/deploy/Dockerfile.personality-worker",
  "/gradle/**",
  "/gradlew",
  "/settings.gradle.kts",
  "/build.gradle.kts",
  "/gradle.properties",
  "/deploy/railway.personality-worker.toml",
]

[deploy]
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
