# kind cluster for local ProCrush development.
# Maps ProCrush web and infrastructure ports to dedicated loopback IPs.
# This keeps standard ports isolated from other local projects.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: procrush
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        listenAddress: 127.10.0.10
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        listenAddress: 127.10.0.10
        protocol: TCP
      - containerPort: 30432
        hostPort: 5432
        listenAddress: 127.10.0.11
        protocol: TCP
      - containerPort: 30433
        hostPort: 5432
        listenAddress: 127.10.0.12
        protocol: TCP
      - containerPort: 30379
        hostPort: 6379
        listenAddress: 127.10.0.13
        protocol: TCP
      - containerPort: 30672
        hostPort: 5672
        listenAddress: 127.10.0.14
        protocol: TCP
      - containerPort: 31672
        hostPort: 15672
        listenAddress: 127.10.0.14
        protocol: TCP
      - containerPort: 30092
        hostPort: 9092
        listenAddress: 127.10.0.15
        protocol: TCP
