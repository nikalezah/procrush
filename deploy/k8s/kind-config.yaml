# kind cluster for local ProCrush development.
#
# extraPortMappings publish cluster services on dedicated loopback IPs so several
# local projects can reuse standard ports (80, 5432, 6379, …) without conflicts.
#
# Host endpoints (after ./gradlew kindUp):
#   127.10.0.10 — web (Ingress)
#   127.10.0.11 — PostgreSQL (api, personality)
#   127.10.0.12 — matching PostgreSQL
#   127.10.0.13 — Redis
#   127.10.0.14 — RabbitMQ (AMQP :5672, UI :15672)
#   127.10.0.15 — Kafka
#   127.10.0.16 — Grafana (:3000)
#   127.10.0.17 — Prometheus (:9090 via NodePort 30090)
#
# Mapping fields:
#   containerPort — NodePort on the kind node (must match Service.nodePort in manifests)
#   hostPort      — port you connect to from the host (standard service port)
#   listenAddress — dedicated loopback IP for this project
#
# Applied only when the cluster is created — recreate after changes:
#   ./gradlew kindDown && ./gradlew kindUp
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: procrush
# Pin the API server host port. kind's default random port often lands in Windows
# Hyper-V excluded ranges after Docker restarts, so `docker start` fails.
networking:
  apiServerAddress: "127.0.0.1"
  apiServerPort: 16443
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Web — ingress-nginx → http://127.10.0.10
      - containerPort: 80
        hostPort: 80
        listenAddress: 127.10.0.10
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        listenAddress: 127.10.0.10
        protocol: TCP

      # PostgreSQL (api, personality) — svc/postgres, NodePort 30432
      - containerPort: 30432
        hostPort: 5432
        listenAddress: 127.10.0.11
        protocol: TCP

      # Matching PostgreSQL — svc/matching-postgres, NodePort 30433
      - containerPort: 30433
        hostPort: 5432
        listenAddress: 127.10.0.12
        protocol: TCP

      # Redis — svc/redis, NodePort 30379
      - containerPort: 30379
        hostPort: 6379
        listenAddress: 127.10.0.13
        protocol: TCP

      # RabbitMQ AMQP — svc/rabbitmq, NodePort 30672
      - containerPort: 30672
        hostPort: 5672
        listenAddress: 127.10.0.14
        protocol: TCP

      # RabbitMQ management UI — svc/rabbitmq, NodePort 31672
      - containerPort: 31672
        hostPort: 15672
        listenAddress: 127.10.0.14
        protocol: TCP

      # Kafka external listener — svc/kafka, NodePort 30092
      - containerPort: 30092
        hostPort: 9092
        listenAddress: 127.10.0.15
        protocol: TCP

      # Grafana — svc/grafana, NodePort 30300
      - containerPort: 30300
        hostPort: 3000
        listenAddress: 127.10.0.16
        protocol: TCP

      # Prometheus — svc/prometheus, NodePort 30090
      - containerPort: 30090
        hostPort: 9090
        listenAddress: 127.10.0.17
        protocol: TCP
