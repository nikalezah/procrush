# kind cluster for local ProCrush development.
# Maps host ports 80/443 to the ingress-nginx controller on the control-plane node.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: procrush
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
