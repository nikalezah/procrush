apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: procrush
  namespace: procrush
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    # No host — matches any Host header (e.g. http://127.10.0.10). Kubernetes Ingress
    # does not allow IP addresses in the host field.
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 8080
