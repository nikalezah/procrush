apiVersion: v1
kind: Service
metadata:
  name: matching-postgres
  namespace: procrush
spec:
  type: NodePort
  selector:
    app: matching-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      nodePort: 30433
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: matching-postgres
  namespace: procrush
spec:
  serviceName: matching-postgres
  replicas: 1
  selector:
    matchLabels:
      app: matching-postgres
  template:
    metadata:
      labels:
        app: matching-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: procrush_matching
            - name: POSTGRES_USER
              value: procrush
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: procrush-secret
                  key: MATCHING_DATABASE_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - procrush
                - -d
                - procrush_matching
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
