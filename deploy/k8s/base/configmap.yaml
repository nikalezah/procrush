apiVersion: v1
kind: ConfigMap
metadata:
  name: procrush-config
  namespace: procrush
data:
  DATABASE_URL: jdbc:postgresql://postgres:5432/procrush
  DATABASE_USER: procrush
  MATCHING_DATABASE_URL: jdbc:postgresql://matching-postgres:5432/procrush_matching
  MATCHING_DATABASE_USER: procrush
  REDIS_URL: redis://redis:6379
  RABBITMQ_URL: amqp://procrush:procrush@rabbitmq:5672/%2F
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  MATCHING_SERVICE_URL: http://matching:8092
  MATCHING_SERVICE_PORT: "8092"
  WORKER_HEALTH_PORT: "8091"
  WEB_ORIGIN: http://127.10.0.10
  FRONTEND_URL: http://127.10.0.10
  SESSION_COOKIE_NAME: procrush_session
  SESSION_DAYS: "30"
  AUTH_DEV_MODE: "true"
  BACKEND_UPSTREAM: api:8080
  PORT: "8080"
  LLM_BASE_URL: https://generativelanguage.googleapis.com/v1beta/openai
  LLM_MODEL: gemini-3.1-flash-lite
  LLM_REQUEST_TIMEOUT_SECONDS: "180"
