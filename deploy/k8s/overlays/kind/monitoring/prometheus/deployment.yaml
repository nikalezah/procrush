apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: procrush
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/prometheus/rules/*.yaml
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]
    scrape_configs:
      - job_name: procrush-api
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [procrush]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: job
            regex: (.+)
            replacement: procrush-$1
  procrush-alerts.yaml: |
    groups:
      - name: procrush
        rules:
          - alert: PersonalityDlqNotEmpty
            expr: rabbitmq_queue_messages{queue="personality.generation.dlq"} > 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: Personality DLQ has messages
          - alert: MatchingDlqRate
            expr: rate(matching_event_dlq_total[5m]) > 0
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: Matching events are landing in DLQ
          - alert: MatchingConsumerDown
            expr: matching_kafka_consumer_running == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: Matching Kafka consumer is not running
          - alert: PersonalityConsumerDown
            expr: personality_rabbit_consumer_running == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: Personality RabbitMQ consumer is not running
          - alert: ServiceNotReady
            expr: up{job=~"procrush-.*"} == 0
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: ProCrush metrics target is down
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: procrush
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      nodePort: 30090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: procrush
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v3.2.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: rules
              mountPath: /etc/prometheus/rules
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: config
          configMap:
            name: prometheus-config
            items:
              - key: prometheus.yml
                path: prometheus.yml
        - name: rules
          configMap:
            name: prometheus-config
            items:
              - key: procrush-alerts.yaml
                path: procrush-alerts.yaml
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: procrush
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: procrush-prometheus
rules:
  - apiGroups: [""]
    resources: [pods, services, endpoints]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: procrush-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: procrush-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: procrush
