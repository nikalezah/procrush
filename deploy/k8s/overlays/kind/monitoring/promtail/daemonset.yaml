apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: procrush
data:
  promtail.yaml: |
    server:
      http_listen_port: 3101
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [procrush]
        pipeline_stages:
          - cri: {}
          - json:
              expressions:
                level: level
                message: message
                trace_id: traceId
                request_id: requestId
                seeker_id: seekerId
                event_id: eventId
                message_id: messageId
          - labels:
              level:
          - structured_metadata:
              trace_id:
              request_id:
              seeker_id:
              event_id:
              message_id:
        relabel_configs:
          - action: drop
            source_labels: [__meta_kubernetes_pod_phase]
            regex: Pending|Succeeded|Failed
          - action: replace
            source_labels: [__meta_kubernetes_pod_node_name]
            target_label: __host__
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - action: replace
            source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - action: replace
            source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - action: replace
            source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - action: replace
            source_labels: [__meta_kubernetes_pod_label_app]
            target_label: service_name
          - action: replace
            source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            separator: /
            target_label: __path__
            replacement: /var/log/pods/*$1/$2/*.log
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: procrush
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: procrush-promtail
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, services, endpoints, pods, namespaces]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: procrush-promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: procrush-promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: procrush
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: procrush
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: grafana/promtail:3.4.2
          args:
            - -config.file=/etc/promtail/promtail.yaml
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - containerPort: 3101
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: run
              mountPath: /run/promtail
            - name: pods
              mountPath: /var/log/pods
              readOnly: true
            - name: containers
              mountPath: /var/log/containers
              readOnly: true
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
      tolerations:
        - effect: NoSchedule
          operator: Exists
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: run
          emptyDir: {}
        - name: pods
          hostPath:
            path: /var/log/pods
        - name: containers
          hostPath:
            path: /var/log/containers
