# Frontend (React + nginx) — build from repository root (monorepo paths in Dockerfile).
# Railway service: Settings → Config file: /deploy/railway.frontend.toml, Root Directory: empty
[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/Dockerfile.frontend"
watchPatterns = [
  "/frontend/**",
  "/deploy/Dockerfile.frontend",
  "/deploy/railway.frontend.toml",
]

[deploy]
restartPolicyType = "ON_FAILURE"
