openapi: 3.1.0
info:
  title: ProCrush API
  version: 1.0.0
  description: ProCrush REST API — surveys, profiles, matching, and personality generation.
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Auth
    description: Authentication and registration
  - name: Reference
    description: Shared reference data (occupations, skills)
  - name: SeekerProfile
    description: Seeker profile, experience, skills, and recommendations
  - name: SeekerSurvey
    description: Seeker survey flow
  - name: SeekerPersonality
    description: Personality profile preview and generation
  - name: Employer
    description: Employer profile and job profiles
paths:
  /api/auth/dev/login:
    post:
      tags:
        - Auth
      operationId: devLogin
      summary: Dev login (AUTH_DEV_MODE only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DevLoginRequest'
      responses:
        '200':
          description: Authenticated user
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserDto'
        '404':
          description: Dev auth disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/auth/me:
    get:
      tags:
        - Auth
      operationId: getMe
      summary: Current session user
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current user (null if not authenticated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
  /api/auth/logout:
    post:
      tags:
        - Auth
      operationId: logout
      summary: Invalidate session
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Logged out
  /api/auth/complete-registration:
    post:
      tags:
        - Auth
      operationId: completeRegistration
      summary: Complete user registration
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteRegistrationRequest'
      responses:
        '200':
          description: Registered user
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserDto'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: User already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/auth/account:
    delete:
      tags:
        - Auth
      operationId: deleteAccount
      summary: Delete current user account
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Account deleted
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/occupations:
    get:
      tags:
        - Reference
      operationId: listOccupations
      summary: List occupations
      security:
        - cookieAuth: []
      parameters:
        - name: leafOnly
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Occupations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OccupationDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
