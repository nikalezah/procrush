components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: procrush_session
  schemas:
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine-readable error code from i18n/error-codes.yaml
        message:
          type: string
          description: English technical message for logs and debugging
        details:
          type: object
          additionalProperties:
            type: string
    UserRole:
      type: string
      enum:
        - SEEKER
        - EMPLOYER
    InterestStatus:
      type: string
      enum:
        - NONE
        - RESPONDED
        - INCOMING
        - MUTUAL
    PersonalityProfileStatus:
      type: string
      enum:
        - NOT_READY
        - PROCESSING
        - READY
        - FAILED
    SurveyStatus:
      type: string
      enum:
        - NOT_STARTED
        - IN_PROGRESS
        - COMPLETED
    AuthUserDto:
      type: object
      required:
        - id
        - email
      properties:
        id:
          type: string
        email:
          type: string
        profileName:
          type: string
          nullable: true
        role:
          $ref: '#/components/schemas/UserRole'
          nullable: true
    DevLoginRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
    CompleteRegistrationRequest:
      type: object
      required:
        - role
      properties:
        email:
          type: string
          nullable: true
        role:
          $ref: '#/components/schemas/UserRole'
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        middleName:
          type: string
          nullable: true
        companyName:
          type: string
          nullable: true
    MeResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/AuthUserDto'
          nullable: true
    OccupationDto:
      type: object
      required:
        - id
        - name
        - isLeaf
      properties:
        id:
          type: integer
          format: int64
        parentId:
          type: integer
          format: int64
          nullable: true
        name:
          type: string
        isLeaf:
          type: boolean
    SkillDto:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
    SuperpowerAndTalentDto:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        isPronounced:
          type: boolean
          nullable: true
    EmployerContactDto:
      type: object
      properties:
        companyName:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        emailContact:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
    SeekerContactDto:
      type: object
      required:
        - firstName
        - lastName
      properties:
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
          nullable: true
        telegram:
          type: string
          nullable: true
        linkedin:
          type: string
          nullable: true
    JobRecommendationDto:
      type: object
      required:
        - id
        - positionName
        - description
        - matchScore
        - matchScoreDisplay
        - interestStatus
      properties:
        id:
          type: integer
          format: int64
        companyName:
          type: string
          nullable: true
        positionName:
          type: string
        description:
          type: string
        matchScore:
          type: number
          format: double
        matchScoreDisplay:
          type: integer
        interestStatus:
          $ref: '#/components/schemas/InterestStatus'
        contactInfo:
          $ref: '#/components/schemas/EmployerContactDto'
          nullable: true
    CandidateRecommendationDto:
      type: object
      required:
        - id
        - firstName
        - lastName
        - positionName
        - skills
        - matchScore
        - matchScoreDisplay
        - interestStatus
      properties:
        id:
          type: integer
          format: int64
        firstName:
          type: string
        lastName:
          type: string
        positionName:
          type: string
        skills:
          type: array
          items:
            type: string
        matchScore:
          type: number
          format: double
        matchScoreDisplay:
          type: integer
        interestStatus:
          $ref: '#/components/schemas/InterestStatus'
        contactInfo:
          $ref: '#/components/schemas/SeekerContactDto'
          nullable: true
    SeekerInterestsResponseDto:
      type: object
      required:
