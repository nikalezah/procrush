openapi: 3.1.0
info:
  title: ProCrush API — Common Models
  version: 1.0.0
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: procrush_session
  schemas:
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine-readable error code from i18n/error-codes.yaml
        message:
          type: string
          description: English technical message for logs and debugging
        details:
          type: object
          additionalProperties:
            type: string
    UserRole:
      type: string
      enum:
        - SEEKER
        - EMPLOYER
    InterestStatus:
      type: string
      enum:
        - NONE
        - RESPONDED
        - INCOMING
        - MUTUAL
    PersonalityProfileStatus:
      type: string
      enum:
        - NOT_READY
        - PROCESSING
        - READY
        - FAILED
    SurveyStatus:
      type: string
      enum:
        - NOT_STARTED
        - IN_PROGRESS
        - COMPLETED
