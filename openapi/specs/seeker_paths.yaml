openapi: 3.1.0
info:
  title: ProCrush API — Seeker Profile Paths
  version: 1.0.0
paths:
  /api/seeker/dashboard:
    get:
      tags:
        - SeekerProfile
      operationId: getSeekerDashboard
      summary: Seeker dashboard
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Dashboard
          content:
            application/json:
              schema:
                $ref: './seeker_models.yaml#/components/schemas/SeekerDashboardDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: './common_models.yaml#/components/schemas/ErrorResponse'
        '403':
          description: Requires SEEKER role
          content:
            application/json:
              schema:
                $ref: './common_models.yaml#/components/schemas/ErrorResponse'
  /api/seeker/me:
    get:
      tags:
        - SeekerProfile
      operationId: getSeekerProfile
      summary: Get seeker profile
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Seeker profile
          content:
            application/json:
              schema:
