        '403':
          description: Requires SEEKER role
          content:
            application/json:
              schema:
                $ref: './common_models.yaml#/components/schemas/ErrorResponse'
    patch:
      tags:
        - SeekerProfile
      operationId: updateSeekerProfile
      summary: Update seeker profile
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './seeker_models.yaml#/components/schemas/UpdateSeekerProfileRequest'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: './seeker_models.yaml#/components/schemas/SeekerProfileDto'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './common_models.yaml#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
