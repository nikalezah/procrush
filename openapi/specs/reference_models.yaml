openapi: 3.1.0
info:
  title: ProCrush API — Reference Models
  version: 1.0.0
components:
  schemas:
    OccupationDto:
      type: object
      required:
        - id
        - name
        - isLeaf
      properties:
        id:
          type: integer
          format: int64
        parentId:
          type: integer
          format: int64
          nullable: true
        name:
          type: string
        isLeaf:
          type: boolean
    SkillDto:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
    SuperpowerAndTalentDto:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        isPronounced:
          type: boolean
          nullable: true
